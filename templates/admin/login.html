<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Bala Skating Academy</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}" />
</head>
<body class="admin-login-body">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <i class="bi bi-stars text-accent fs-1"></i>
        <h4 class="mt-2 fw-bold">Bala <span class="text-accent">Skating</span> Academy</h4>
        <p class="text-muted small">Admin Panel</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
      {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('admin_login') }}" class="mt-3">
        <div class="mb-3">
          <label class="form-label fw-medium">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-medium">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required />
          </div>
        </div>
        <button type="submit" class="btn btn-accent w-100 py-2 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>
      </form>
      <div class="text-center mt-4">
        <a href="{{ url_for('index') }}" class="text-muted small">
          <i class="bi bi-arrow-left me-1"></i>Back to Website
        </a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
